# fleet.conf — config for the durable "fleet" tmux server (socket: ~/.tmux/fleet.sock)
# loaded explicitly by the fleet CLI; does NOT affect your normal tmux.

set -g history-limit 100000          # big scrollback so peek/capture sees real context
set -g mouse on
set -g status-interval 5
set -g allow-rename off              # window names stay what `fleet new` set them to
setw -g automatic-rename off
set -g destroy-unattached off        # windows live even with nobody attached
set -g remain-on-exit off
set -sg escape-time 10

# status bar: show every window + a fleet badge so you always know where you are
set -g status-style "bg=colour234,fg=colour250"
set -g status-left "#[bg=colour33,fg=black,bold] FLEET #[default] "
set -g status-left-length 20
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=colour33,fg=black,bold] #I:#W "
set -g status-right "#[fg=colour245]%a %H:%M "
